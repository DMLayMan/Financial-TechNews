site_name: Financial & Tech News Archive
site_url: https://dmlayman.github.io/Financial-TechNews/
site_author: DMLayMan
site_description: 每日港美股复盘与 AI 大事件深度分析归档 — 由 Claude Cowork 定时生成。
repo_url: https://github.com/DMLayMan/Financial-TechNews
repo_name: DMLayMan/Financial-TechNews
edit_uri: edit/main/docs/
copyright: "© DMLayMan — Generated by Claude Cowork"

theme:
  name: material
  language: zh
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.action.edit
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: 切换到暗色模式
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: 切换到亮色模式
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  font:
    text: Noto Sans SC
    code: JetBrains Mono

plugins:
  - search:
      lang:
        - zh
        - en
  - blog:
      blog_dir: finance
      blog_toc: true
      post_url_format: "{date}/{slug}"
      post_date_format: full
      post_url_date_format: yyyy-MM-dd
      archive_date_format: yyyy/MM
      categories_allowed:
        - 港股
        - 美股
        - 复盘
        - 预测
        - 宏观
      pagination_per_page: 10
  - blog:
      blog_dir: ai-tech
      blog_toc: true
      post_url_format: "{date}/{slug}"
      post_date_format: full
      post_url_date_format: yyyy-MM-dd
      archive_date_format: yyyy/MM
      categories_allowed:
        - 大模型
        - Agent
        - 产品
        - 工程
        - 基础设施
        - 论文
      pagination_per_page: 10
  - tags

nav:
  - 首页: index.md
  - 财经归档:
      - finance/index.md
  - AI 科技归档:
      - ai-tech/index.md
  - 关于: about.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/DMLayMan
  generator: false
